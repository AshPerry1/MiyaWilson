# Publish to GitHub Pages. Repo Settings → Pages → Source: GitHub Actions (not “Deploy from branch”).
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect static files
        run: |
          mkdir -p _site _site/assets
          cp index.html about.html kits.html styles.css lux-motion.js site-tour.js site-chat.js _site/
          cp assets/logo-movewise.png assets/miya-about.png assets/miya-home.png _site/assets/
          test -f .nojekyll && cp .nojekyll _site/ || touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
